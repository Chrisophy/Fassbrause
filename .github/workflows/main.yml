name: Automatische News-Aktualisierung

on:
  schedule:
    - cron: '34 * * * *'
  workflow_dispatch:       # Ermöglicht manuellen Start per Knopfdruck auf GitHub

# SCHLÜSSEL ZUM ERFOLG: Schreibrechte für die Action aktivieren
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python initialisieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: Scraper ausführen
      run: python fetch_news.py

    - name: Änderungen zurückschreiben
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add news.json
        
        # Prüfen, ob wirklich Änderungen vorliegen
        if git diff --staged --quiet; then
          echo "Keine Änderungen an news.json gefunden. Überspringe Commit."
        else
          git commit -m "Automatisches Update der news.json"
          git push
        fi
