name: HTML2APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Installiert die passende Gradle-Version für den Build
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Python Compiler Script
      run: python compiler.py

    # Lädt die fertige APK unter "Artifacts" hoch
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GEZ-KiNO
        path: build_output/app/build/outputs/apk/debug/gez-kino.apk
