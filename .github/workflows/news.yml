name: Automatische News-Aktualisierung

on:
  schedule:
    - cron: '*/30 * * * *'  # Läuft alle 30 Minuten (mit GitHub-typischer Verzögerung)
  workflow_dispatch:       # Ermöglicht manuellen Start per Knopfdruck

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python initialisieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: Scraper ausführen
      run: python fetch_news.py

    - name: Änderungen automatisch committen
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update news.json via GitHub Action [skip ci]"
        file_pattern: 'news.json'
