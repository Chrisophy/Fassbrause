name: Automatische News-Aktualisierung

on:
  schedule:
    - cron: '*/30 * * * *'  # Läuft alle 30 Minuten (mit GitHub-typischer Verzögerung)
  workflow_dispatch:       # Ermöglicht manuellen Start per Knopfdruck auf GitHub

# Verhindert, dass parallele oder überlappende Runs sich gegenseitig blockieren
concurrency:
  group: news-updater-${{ github.ref }}
  cancel-in-progress: true

# Schreibrechte für die Action aktivieren, um die news.json hochzuladen
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        fetch-depth: 0     # Wichtig: Holt die gesamte Git-Historie für einen sauberen Rebase

    - name: Python initialisieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: Scraper ausführen
      run: python fetch_news.py

    - name: Änderungen sicher committen und pushen
      run: |
        git config --global user.name 'GitHub Automation'
        git config --global user.email 'actions@github.com'
        
        # Prüfen, ob dein Python-Skript die news.json verändert hat
        if [ -n "$(git status --porcelain news.json)" ]; then
          echo "Änderungen an news.json erkannt. Erstelle lokalen Commit..."
          git add news.json
          git commit -m "Update news.json via GitHub Action [skip ci]"
          
          echo "Hole neueste Remote-Änderungen ab und setze Commit oben drauf (Rebase)..."
          git fetch --unshallow || git fetch --all
          git pull --rebase origin main
          
          echo "Pushe den sauberen Stand zurück zu GitHub..."
          git push origin main
        else
          echo "Keine Änderungen an der news.json festgestellt. Überspringe Push."
        fi
