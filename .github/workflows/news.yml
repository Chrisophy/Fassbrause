name: Automatische News-Aktualisierung

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# 1. SCHUTZ: Verhindert, dass sich parallele Runs gegenseitig blockieren
concurrency:
  group: news-updater-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Wichtig: Holt die Git-Historie für saubere Updates

    - name: Python initialisieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: Scraper ausführen
      run: python fetch_news.py

    # 2. SCHUTZ: Vor dem Commit den allerneuesten Stand vom Server holen
    - name: Letzte Änderungen vom Server abholen
      run: |
        git config --global user.name 'GitHub Automation'
        git config --global user.email 'actions@github.com'
        git pull --rebase origin main

    - name: Änderungen automatisch committen
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update news.json via GitHub Action [skip ci]"
        file_pattern: 'news.json'
