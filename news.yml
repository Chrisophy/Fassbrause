name: Automatische News-Aktualisierung

on:
  schedule:
    - cron: '*/30 * * * *'  # Läuft alle 30 Minuten
  workflow_dispatch:       # Manueller Start möglich

concurrency:
  group: news-updater-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v4
      with:
        fetch-depth: 0     # Holt die Historie für den Rebase

    - name: Python initialisieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4

    - name: Scraper ausführen
      run: python fetch_news.py

    - name: Änderungen sicher committen und pushen
      run: |
        git config --global user.name 'GitHub Automation'
        git config --global user.email 'actions@github.com'
        
        # Prüfen, ob Änderungen vorliegen
        if [ -n "$(git status --porcelain news.json)" ]; then
          echo "Änderungen an news.json erkannt. Erstelle lokalen Commit..."
          git add news.json
          git commit -m "Update news.json via GitHub Action [skip ci]"
          
          echo "Hole neueste Remote-Änderungen. Konflikte werden durch lokale Daten überschrieben..."
          git fetch --unshallow || git fetch --all
          git pull --rebase -X theirs origin main
          
          echo "Pushe den aktuellen HEAD direkt in den Remote-Branch main..."
          # HIER IST DIE ENTCHEIDENDE ÄNDERUNG: HEAD:main statt nur main
          git push origin HEAD:main
        else
          echo "Keine Änderungen an der news.json festgestellt. Überspringe Push."
        fi
