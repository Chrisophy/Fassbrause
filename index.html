    <script>
        const TMDB_API_KEY = '60b3801a9e76b5706ee2a432f06423e6';
        const MEDIATHEK_URL = 'https://mediathekviewweb.de/api/query';
        const IPTV_URL = 'https://raw.githubusercontent.com/jnk22/kodinerds-iptv/refs/heads/master/iptv/clean/clean_tv_main.m3u';
        const NEWS_URL = 'https://raw.githubusercontent.com/Chrisophy/GEZ-KiNO/refs/heads/main/news.json';
        
        const GENRES_MAP = {
            28: 'Action', 12: 'Abenteuer', 16: 'Animation', 35: 'Komödie', 80: 'Krimi', 99: 'Doku',
            18: 'Drama', 10751: 'Familie', 14: 'Fantasy', 36: 'Historie', 27: 'Horror', 10402: 'Musik', 
            9648: 'Mystery', 10749: 'Romanze', 878: 'Sci-Fi', 10770: 'TV-Film', 53: 'Thriller', 
            10752: 'Krieg', 37: 'Western'
        };

        const QUERIES = ['Spielfilm', 'Spielfilme', 'Spielfilm-Highlights', 'Filme', 'Kino - Filme'];
        
        let allMovies = [];
        let liveTvChannels = [];
        let newsArticles = []; 
        let moviesToRender = []; 
        let favoriteUrls = JSON.parse(localStorage.getItem('gez_kino_favs') || '[]');
        let currentGenre = 'Alle';
        let currentView = 'mediathek'; 
        let chunkObserver = null;
        let hlsInstance = null;
        let activeVideoErrorHandler = null; 
        let deferredPrompt = null; 
        let activeDownloadUrl = ''; 
        const CHUNK_SIZE = 60; 

        function cleanTitle(title) {
            let yearMatch = title.match(/(\d{4})/);
            let year = yearMatch ? yearMatch[1] : 'None';
            
            let clean = title;
            const markers = [
                ' - Spielfilm', ' – Spielfilm', ' - Spiellfilm', ' – Spiellfilm', ', Spielfilm', 
                ' Österreich', ', Deutschland', ', Schweiz', ', Belgien', ', Frankreich', ', Spanien',
                ', Niederlande', ', Irland', ', Luxemburg', ', Italien', ', USA', ', Kosovo', 
                ', Großbritannien', ', Tschechische Republik', ', Norwegen', ', BRD', ', Dänemark', 
                ', Australien', ', Schweden', ', Video:', ', Präsentiert:', ', Kurzfilm', ' Fernsehfilm', 
                ' Heimatfilm', ' - Thriller', ' - Drama', '«', '»'
            ];

            markers.forEach(marker => {
                clean = clean.split(new RegExp(marker, 'i'))[0];
            });

            clean = clean.replace(/^(Spielfilm|Spiellfilm):\s*/i, '');
            clean = clean.replace(/–/g, '-').replace(/—/g, '-');
            clean = clean.replace(/\(.*?\)/g, '');
            clean = clean.trim().replace(/[ \t,.\-_–—»]+$/, '');

            return { cleanName: clean, year: year };
        }

        async function fetchAllData() {
            document.getElementById('scanner').classList.remove('hidden');
            const seenUrls = new Set();
            const seenTitles = new Set();
            let tempResults = [];

            try {
                const promises = QUERIES.map(q => {
                    const payload = {
                        queries: [{ fields: ['topic'], query: q }],
                        size: 2000,
                        sortBy: 'timestamp',
                        sortOrder: 'desc'
                    };
                    return fetch(MEDIATHEK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    }).then(res => res.json()).catch(() => ({ result: { results: [] } }));
                });

                const responses = await Promise.all(promises);

                responses.forEach(data => {
                    const results = data.result?.results || [];
                    results.forEach(m => {
                        const url = m.url_video || '';
                        const title = m.title || '';
                        if (!url || !title) return;

                        const lowerTitle = title.toLowerCase();
                        if (/audiodeskription|audio description|ad version|hörfilm|deskription|barrierefrei/.test(lowerTitle)) return;
                        if (seenUrls.has(url)) return;
                        
                        const { cleanName, year } = cleanTitle(title);
                        if (!cleanName) return;

                        const normTitle = cleanName.toLowerCase().trim();
                        if (seenTitles.has(normTitle)) return;
                        if (m.duration < 4680) return;

                        seenUrls.add(url);
                        seenTitles.add(normTitle);

                        tempResults.push({
                            title: cleanName,
                            search: cleanName,
                            year: year,
                            video_url: url,
                            plot: 'Lade Filminformationen...',
                            rating: 'N/A',
                            thumb: 'placeholder.png', 
                            genres_list: ['Sonstige'],
                            channel: m.channel
                        });
                    });
                });

                allMovies = tempResults.sort((a, b) => a.title.localeCompare(b.title));
                
                if (allMovies.length === 0 && currentView === 'mediathek') {
                    document.getElementById('statusMessage').innerText = "Keine Filme gefunden.";
                    return;
                }

                renderGenreLeiste();
                filterResults();
                hydrateWithTMDBParallel();

            } catch (err) {
                console.error(err);
                if (currentView === 'mediathek') {
                    document.getElementById('statusMessage').innerText = "Fehler beim API-Abruf.";
                }
            }
        }

        async function fetchLiveTvData() {
            if (liveTvChannels.length > 0) return;
            document.getElementById('scanner').classList.remove('hidden');
            
            try {
                const res = await fetch(IPTV_URL);
                const text = await res.text();
                const lines = text.split(/\r?\n/);
                let currentChannel = null;

                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        const commaIdx = line.indexOf(',');
                        const name = commaIdx !== -1 ? line.substring(commaIdx + 1).trim() : 'Unbekannter Sender';
                        
                        currentChannel = {
                            title: name,
                            search: name,
                            year: 'LIVE',
                            video_url: '',
                            plot: 'Live-Stream des öffentlich-rechtlichen Rundfunks über das Kodinerds IPTV-Projekt.',
                            rating: 'TV',
                            thumb: logoMatch ? logoMatch[1] : 'placeholder.png',
                            genres_list: ['Live TV'],
                            channel: 'ÖRR'
                        };
                    } else if (line.startsWith('http') && currentChannel) {
                        currentChannel.video_url = line;
                        liveTvChannels.push(currentChannel);
                        currentChannel = null;
                    }
                }
                liveTvChannels.sort((a, b) => a.title.localeCompare(b.title));
            } catch (err) {
                console.error("Fehler beim IPTV-Parsing:", err);
            } finally {
                document.getElementById('scanner').classList.add('hidden');
            }
        }

        async function fetchNewsData() {
            if (newsArticles.length > 0) return;
            document.getElementById('scanner').classList.remove('hidden');
            
            try {
                const res = await fetch(NEWS_URL);
                const data = await res.json();
                
                newsArticles = data.map((item, index) => {
                    const teaser = item.description || item.plot || item.summary || '';
                    const bodyText = item.content || item.body || item.text || teaser || 'Kein Text verfügbar.';
                    
                    // Verhindert identische/leere Links bei News-Einträgen
                    const fallbackUrl = item.link || item.url || `#news-art-${index}`;

                    return {
                        id: `news-art-${index}`, 
                        title: item.title || 'Keine Überschrift',
                        search: `${item.title || ''} ${teaser}`.toLowerCase(),
                        year: item.date || item.published || 'Heute',
                        video_url: fallbackUrl,
                        plot: teaser || 'Klicke auf Lesen, um den vollen Artikel zu öffnen.',
                        full_text: bodyText,
                        rating: 'NEWS',
                        thumb: item.image || item.thumbnail || item.thumb || 'placeholder.png',
                        genres_list: item.genres_list || [item.category || 'News'],
                        channel: item.source || item.channel || 'Nachrichten'
                    };
                });
            } catch (err) {
                console.error("Fehler beim News-Abruf:", err);
            } finally {
                document.getElementById('scanner').classList.add('hidden');
            }
        }

        async function switchView(view) {
            if (currentView === view) return;
            currentView = view;
            
            const btnMedia = document.getElementById('btnMediathek');
            const btnTv = document.getElementById('btnLiveTv');
            const btnNews = document.getElementById('btnNews'); 
            const searchBar = document.getElementById('searchBar');
            
            searchBar.value = '';
            currentGenre = 'Alle';

            const inactiveClass = "px-4 py-2.5 rounded-xl bg-gray-900 border border-gray-800 text-gray-400 hover:text-white transition-all cursor-pointer text-sm flex-1 sm:flex-none text-center";
            const activeClass = "px-4 py-2.5 rounded-xl bg-blue-600 text-white font-bold shadow-lg transition-all cursor-pointer text-sm flex-1 sm:flex-none text-center";

            btnMedia.className = inactiveClass;
            btnTv.className = inactiveClass;
            btnNews.className = inactiveClass;

            const grid = document.getElementById('movieGrid');

            if (view === 'mediathek') {
                btnMedia.className = activeClass;
                searchBar.placeholder = "Film suchen...";
                renderGenreLeiste();
                filterResults();
            } else if (view === 'livetv') {
                btnTv.className = activeClass;
                searchBar.placeholder = "Sender suchen...";
                grid.innerHTML = `<div id="statusMessage" class="text-center col-span-full py-12 text-gray-400 animate-pulse">Lade Live TV Sender...</div>`;
                await fetchLiveTvData();
                renderGenreLeiste();
                filterResults();
            } else if (view === 'news') { 
                btnNews.className = activeClass;
                searchBar.placeholder = "News suchen...";
                grid.innerHTML = `<div id="statusMessage" class="text-center col-span-full py-12 text-gray-400 animate-pulse">Lade aktuelle News...</div>`;
                await fetchNewsData();
                renderGenreLeiste();
                filterResults();
            }
        }

        async function hydrateWithTMDBParallel() {
            const CONCURRENCY_LIMIT = 50;
            let movieIndex = 0;
            let loadedCount = 0;

            async function worker() {
                while (movieIndex < allMovies.length) {
                    const currentIdx = movieIndex++;
                    const movie = allMovies[currentIdx];
                    if (!movie) break;

                    let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movie.search)}&language=de-DE&include_adult=false`;
                    if (movie.year !== 'None') url += `&year=${movie.year}`;

                    try {
                        const res = await fetch(url);
                        if (res.status === 429) {
                            movieIndex--;
                            await new Promise(resolve => setTimeout(resolve, 800));
                            continue;
                        }
                        const data = await res.json();
                        
                        if (data.results && data.results.length > 0) {
                            const tmdb = data.results[0];
                            movie.plot = tmdb.overview || 'Keine Beschreibung verfügbar.';
                            movie.rating = tmdb.vote_average ? tmdb.vote_average.toFixed(1) : 'N/A';
                            movie.thumb = tmdb.poster_path ? `https://image.tmdb.org/t/p/w342${tmdb.poster_path}` : 'placeholder.png';
                            
                            if (tmdb.release_date && movie.year === 'None') {
                                movie.year = tmdb.release_date.split('-')[0];
                            }

                            if (tmdb.genre_ids) {
                                movie.genres_list = tmdb.genre_ids
                                    .map(id => GENRES_MAP[id])
                                    .filter(g => g !== undefined);
                                if (movie.genres_list.length === 0) movie.genres_list = ['Sonstige'];
                            }

                            if (currentView === 'mediathek') {
                                updateMovieCard(movie);
                            }
                        }
                    } catch (e) {
                        console.error("TMDB-Fehler bei: " + movie.search);
                    }

                    loadedCount++;
                    if (loadedCount % 15 === 0) {
                        updateGenreCounts();
                    }
                }
            }

            const workers = Array.from({ length: CONCURRENCY_LIMIT }, worker);
            await Promise.all(workers);
            updateGenreCounts();
            document.getElementById('scanner').classList.add('hidden');
        }

        function getGenreCounts() {
            const counts = { "Alle": 0, "Sonstige": 0, "Nach Jahren": 0, "⭐ Favoriten": 0 };
            Object.values(GENRES_MAP).forEach(g => counts[g] = 0);

            let currentSet = allMovies;
            if (currentView === 'livetv') currentSet = liveTvChannels;
            if (currentView === 'news') currentSet = newsArticles;

            currentSet.forEach(m => {
                counts["Alle"]++;
                if (favoriteUrls.includes(m.video_url)) {
                    counts["⭐ Favoriten"]++;
                }
                if (currentView === 'mediathek') {
                    if (m.year && m.year !== 'None' && parseInt(m.year) > 1900) {
                        counts["Nach Jahren"]++;
                    }
                    if (!m.genres_list || m.genres_list.includes('Sonstige')) {
                        counts["Sonstige"]++;
                    } else {
                        m.genres_list.forEach(g => { if (g in counts) counts[g]++; });
                    }
                } else if (currentView === 'news') {
                    if (m.genres_list) {
                        m.genres_list.forEach(g => {
                            if (!counts[g]) counts[g] = 0;
                            counts[g]++;
                        });
                    }
                }
            });
            return counts;
        }

        function renderGenreLeiste() {
            const leiste = document.getElementById('genreLeiste');
            const counts = getGenreCounts();
            
            let genres = [];
            if (currentView === 'mediathek') {
                const sortedGenres = Object.values(GENRES_MAP).sort();
                genres = ['Alle', 'Nach Jahren', '⭐ Favoriten', ...sortedGenres, 'Sonstige'];
            } else if (currentView === 'news') {
                const newsCats = new Set();
                newsArticles.forEach(m => {
                    if (m.genres_list) m.genres_list.forEach(g => newsCats.add(g));
                });
                genres = ['Alle', '⭐ Favoriten', ...Array.from(newsCats).sort()];
            } else {
                genres = ['Alle', '⭐ Favoriten'];
            }

            leiste.innerHTML = '';
            genres.forEach(g => {
                const btn = document.createElement('button');
                const cleanId = g.replace(/\s+/g, '').replace(/⭐/g, 'Fav').replace(/[^a-zA-Z0-9]/g, '');
                btn.id = `genre-btn-${cleanId}`;
                
                const isActive = currentGenre === g || (g === 'Nach Jahren' && currentGenre.startsWith('Jahr: '));
                btn.className = `flex-shrink-0 min-w-[120px] px-4 py-2 rounded-xl text-center flex flex-col justify-center transition-all cursor-pointer border ${
                    isActive ? 'bg-blue-600 border-blue-500 text-white font-bold' : 'bg-gray-900 border-gray-800 text-gray-300 hover:border-gray-700'
                }`;

                btn.innerHTML = `
                    <span class="text-sm tracking-wide">${g === currentGenre.replace('Jahr: ', 'Jahr ') ? currentGenre : g}</span>
                    <span class="text-[10px] opacity-60 font-light genre-count">${counts[g] !== undefined ? '(' + counts[g] + ')' : '(0)'}</span>
                `;

                btn.onclick = () => {
                    if (g === 'Nach Jahren') {
                        openYearsMenu();
                    } else {
                        currentGenre = g;
                        setActiveGenreStyling();
                        filterResults();
                    }
                };
                leiste.appendChild(btn);
            });
        }

        function updateGenreCounts() {
            const counts = getGenreCounts();
            Object.keys(counts).forEach(g => {
                const cleanId = g.replace(/\s+/g, '').replace(/⭐/g, 'Fav').replace(/[^a-zA-Z0-9]/g, '');
                const btn = document.getElementById(`genre-btn-${cleanId}`);
                if (btn) {
                    const countSpan = btn.querySelector('.genre-count');
                    if (countSpan) countSpan.innerText = `(${counts[g] || 0})`;
                }
            });
        }

        function setActiveGenreStyling() {
            let genres = [];
            if (currentView === 'mediathek') {
                const sortedGenres = Object.values(GENRES_MAP).sort();
                genres = ['Alle', 'Nach Jahren', '⭐ Favoriten', ...sortedGenres, 'Sonstige'];
            } else if (currentView === 'news') {
                const newsCats = new Set();
                newsArticles.forEach(m => {
                    if (m.genres_list) m.genres_list.forEach(g => newsCats.add(g));
                });
                genres = ['Alle', '⭐ Favoriten', ...Array.from(newsCats).sort()];
            } else {
                genres = ['Alle', '⭐ Favoriten'];
            }
            
            genres.forEach(g => {
                const cleanId = g.replace(/\s+/g, '').replace(/⭐/g, 'Fav').replace(/[^a-zA-Z0-9]/g, '');
                const btn = document.getElementById(`genre-btn-${cleanId}`);
                if (!btn) return;
                
                const isActive = currentGenre === g || (g === 'Nach Jahren' && currentGenre.startsWith('Jahr: '));
                
                if (isActive) {
                    btn.className = "flex-shrink-0 min-w-[120px] px-4 py-2 rounded-xl text-center flex flex-col justify-center transition-all cursor-pointer border bg-blue-600 border-blue-500 text-white font-bold";
                    if (currentGenre.startsWith('Jahr: ')) {
                        btn.querySelector('span').innerText = currentGenre;
                    }
                } else {
                    btn.className = "flex-shrink-0 min-w-[120px] px-4 py-2 rounded-xl text-center flex flex-col justify-center transition-all cursor-pointer border bg-gray-900 border-gray-800 text-gray-300 hover:border-gray-700";
                    if (g === 'Nach Jahren') btn.querySelector('span').innerText = 'Nach Jahren';
                }
            });
        }

        function openYearsMenu() {
            const yearsSet = new Set();
            allMovies.forEach(m => {
                if (m.year && m.year !== 'None' && parseInt(m.year) > 1900) yearsSet.add(m.year);
            });
            const sortedYears = Array.from(yearsSet).sort((a, b) => b - a);

            const grid = document.getElementById('yearsGrid');
            grid.innerHTML = '';

            sortedYears.forEach(yr => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-800 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all cursor-pointer text-sm";
                btn.innerText = yr;
                btn.onclick = () => {
                    currentGenre = `Jahr: ${yr}`;
                    closeYearsModal();
                    setActiveGenreStyling();
                    filterResults();
                };
                grid.appendChild(btn);
            });

            document.getElementById('yearsModal').style.display = 'flex';
        }

        function closeYearsModal() {
            document.getElementById('yearsModal').style.display = 'none';
        }

        function filterResults() {
            const query = document.getElementById('searchBar').value.toLowerCase().trim();
            
            let currentSet = allMovies;
            if (currentView === 'livetv') currentSet = liveTvChannels;
            if (currentView === 'news') currentSet = newsArticles;
            
            moviesToRender = currentSet.filter(m => {
                if (query && !m.title.toLowerCase().includes(query) && !m.plot.toLowerCase().includes(query)) {
                    return false;
                }
                if (currentGenre === 'Alle') return true;
                if (currentGenre === '⭐ Favoriten') return favoriteUrls.includes(m.video_url);
                
                if (currentView === 'mediathek') {
                    if (currentGenre === 'Sonstige') return !m.genres_list || m.genres_list.includes('Sonstige');
                    if (currentGenre.startsWith('Jahr: ')) {
                        return m.year === currentGenre.replace('Jahr: ', '');
                    }
                    return m.genres_list && m.genres_list.includes(currentGenre);
                }
                if (currentView === 'news') {
                    return m.genres_list && m.genres_list.includes(currentGenre);
                }
                return true;
            });

            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';

            if (moviesToRender.length === 0) {
                grid.innerHTML = `<div class="text-center col-span-full py-12 text-gray-500">Keine Inhalte für diese Auswahl vorhanden.</div>`;
                return;
            }

            renderNextChunk(0);
            setupInfiniteScroll();
        }

        function togglePlot(element) {
            element.classList.toggle('line-clamp-3');
        }

        function renderNextChunk(startIndex) {
            const grid = document.getElementById('movieGrid');
            
            const oldSentinel = document.getElementById('scrollSentinel');
            if (oldSentinel) oldSentinel.remove();

            const endIndex = Math.min(startIndex + CHUNK_SIZE, moviesToRender.length);
            const chunk = moviesToRender.slice(startIndex, endIndex);
            const fragment = document.createDocumentFragment();

            chunk.forEach(m => {
                const card = document.createElement('div');
                const uniqueCardId = m.id || btoa(encodeURIComponent(m.video_url)).replace(/=/g, '');
                card.id = `movie-${uniqueCardId}`;
                card.className = "bg-gray-900 rounded-xl overflow-hidden shadow-md border border-gray-800 flex flex-col justify-between hover:border-blue-500 transition-all duration-200 group h-fit";
                
                const escapedTitle = m.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const isTv = currentView === 'livetv';
                const isNews = currentView === 'news'; 
                const isFav = favoriteUrls.includes(m.video_url);

                const isDirectVideo = m.video_url.match(/\.(mp4|m3u8|mkv|avi)(\?.*)?$/i);
                
                const clickAction = (isNews && !isDirectVideo) 
                    ? `openNewsModal('${m.id}')` 
                    : `openPlayer('${m.video_url}', '${escapedTitle}')`;
                const buttonText = (isNews && !isDirectVideo) ? 'LESEN' : 'ABSPIELEN';

                let badgeClass = "text-yellow-400";
                let badgeText = `★ ${m.rating}`;
                if (isTv) { badgeClass = "text-red-500"; badgeText = "🔴 LIVE"; }
                if (isNews) { badgeClass = "text-blue-400"; badgeText = "📰 NEWS"; }

                const plotClickAction = isNews ? `openNewsModal('${m.id}')` : 'togglePlot(this)';
                const plotTitleHint = isNews ? 'Klicken, um den ganzen Artikel zu lesen' : 'Klicken, um die Beschreibung zu erweitern';

                card.innerHTML = `
                    <div class="relative aspect-[2/3] w-full bg-gray-950 overflow-hidden flex items-center justify-center p-4">
                        <button onclick="toggleFavorite('${m.video_url}', '${uniqueCardId}', event)" 
                                class="fav-btn absolute top-2 left-2 bg-black/70 px-2 py-0.5 text-sm font-bold rounded transition-colors cursor-pointer ${isFav ? 'text-yellow-400 hover:text-gray-400' : 'text-gray-400 hover:text-yellow-400'} z-10">
                            ${isFav ? '★' : '☆'}
                        </button>
                        <img src="${m.thumb}" alt="" class="${(isTv || isNews) ? 'max-w-full max-h-full object-contain' : 'w-full h-full object-cover'} group-hover:scale-105 transition-transform duration-300" 
                             onerror="if(!this.src.includes('placeholder.png'))this.src='placeholder.png';">
                        <span class="absolute top-2 right-2 bg-black/70 px-2 py-0.5 text-xs font-bold ${badgeClass} rounded">
                            ${badgeText}
                        </span>
                    </div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 onclick="${isNews ? clickAction : ''}" class="font-bold text-sm text-gray-100 line-clamp-2 mb-1 group-hover:text-blue-400 transition-colors ${isNews ? 'cursor-pointer' : ''}" title="${m.title}">${m.title}</h3>
                            <p class="text-gray-500 text-[11px] mb-2">${m.channel} · ${m.year}</p>
                            
                            <p onclick="${plotClickAction}" 
                               class="text-gray-400 text-xs line-clamp-3 mb-3 font-light cursor-pointer hover:text-gray-200 transition-colors" 
                               title="${plotTitleHint}">
                               ${m.plot}
                            </p>
                        </div>
                        <div class="space-y-2">
                            <div class="flex flex-wrap gap-1 mb-2">
                                ${m.genres_list.map(g => `<span class="bg-gray-800 text-gray-400 text-[10px] px-1.5 py-0.5 rounded">${g}</span>`).join('')}
                            </div>
                            <button onclick="${clickAction}" 
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-1.5 px-3 rounded-lg transition-colors text-xs tracking-wide cursor-pointer">
                                ${buttonText}
                            </button>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            });

            grid.appendChild(fragment);

            if (endIndex < moviesToRender.length) {
                const sentinel = document.createElement('div');
                sentinel.id = 'scrollSentinel';
                sentinel.className = 'w-full h-12 col-span-full flex justify-center items-center';
                grid.appendChild(sentinel);
                
                if (chunkObserver) chunkObserver.observe(sentinel);
            }
        }

        function setupInfiniteScroll() {
            if (chunkObserver) chunkObserver.disconnect();

            chunkObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    const currentCount = document.querySelectorAll('#movieGrid > div:not(#scrollSentinel)').length;
                    if (currentCount < moviesToRender.length) {
                        renderNextChunk(currentCount);
                    }
                }
            }, { rootMargin: '400px' });

            const sentinel = document.getElementById('scrollSentinel');
            if (sentinel) chunkObserver.observe(sentinel);
        }

        function updateMovieCard(m) {
            const uniqueCardId = m.id || btoa(encodeURIComponent(m.video_url)).replace(/=/g, '');
            const card = document.getElementById(`movie-${uniqueCardId}`);
            if (!card) return; 

            const img = card.querySelector('img');
            if (img && m.thumb !== 'placeholder.png') img.src = m.thumb;

            const ratingBadge = card.querySelector('.text-yellow-400');
            if (ratingBadge) ratingBadge.innerText = `★ ${m.rating}`;

            const plotText = card.querySelector('.p-3 p.text-gray-400');
            if (plotText) plotText.innerText = m.plot;

            const infoText = card.querySelector('.text-gray-500');
            if (infoText) infoText.innerText = `${m.channel} · ${m.year}`;

            const genreBox = card.querySelector('.flex-wrap');
            if (genreBox) {
                genreBox.innerHTML = m.genres_list.map(g => `<span class="bg-gray-800 text-gray-400 text-[10px] px-1.5 py-0.5 rounded">${g}</span>`).join('');
            }
        }

        // Erwartet jetzt zusaetzlich das genaue cardId-Format
        function toggleFavorite(url, cardId, event) {
            if (event) event.stopPropagation();
            const index = favoriteUrls.indexOf(url);
            
            if (index > -1) {
                favoriteUrls.splice(index, 1);
            } else {
                favoriteUrls.push(url);
            }
            
            localStorage.setItem('gez_kino_favs', JSON.stringify(favoriteUrls));
            
            const card = document.getElementById(`movie-${cardId}`);
            if (card) {
                const btn = card.querySelector('.fav-btn');
                const isFav = favoriteUrls.includes(url);
                if (btn) {
                    btn.innerText = isFav ? '★' : '☆';
                    btn.className = `fav-btn absolute top-2 left-2 bg-black/70 px-2 py-0.5 text-sm font-bold rounded transition-colors cursor-pointer ${isFav ? 'text-yellow-400 hover:text-gray-400' : 'text-gray-400 hover:text-yellow-400'} z-10`;
                }
            }
            
            updateGenreCounts();
            if (currentGenre === '⭐ Favoriten') filterResults();
        }

        function openNewsModal(id) {
            const article = newsArticles.find(m => m.id === id);
            if (!article) return;

            document.getElementById('newsModalTitle').innerText = article.title;
            document.getElementById('newsModalMetaChannel').innerText = article.channel;
            document.getElementById('newsModalMetaDate').innerText = article.year;
            document.getElementById('newsModalContent').innerText = article.full_text || article.plot;

            const imgContainer = document.getElementById('newsModalImageContainer');
            const img = document.getElementById('newsModalImage');
            
            if (article.thumb && article.thumb !== 'placeholder.png') {
                img.src = article.thumb;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            const extLink = document.getElementById('newsModalExternalLink');
            // Zeigt den Link nur an, wenn es ein echter externer Link (http) ist
            if (article.video_url && article.video_url.startsWith('http')) {
                extLink.href = article.video_url;
                extLink.classList.remove('hidden');
            } else {
                extLink.classList.add('hidden');
            }

            document.getElementById('newsModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeNewsModal() {
            document.getElementById('newsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function copyVideoUrl() {
            if (!activeDownloadUrl) return;
            navigator.clipboard.writeText(activeDownloadUrl).then(() => {
                const btn = document.getElementById('modalCopyBtn');
                const oldText = btn.innerHTML;
                btn.innerHTML = '✅ Kopiert!';
                btn.classList.remove('bg-gray-800', 'text-gray-300');
                btn.classList.add('bg-blue-600', 'text-white', 'border-blue-500');
                setTimeout(() => {
                    btn.innerHTML = oldText;
                    btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-500');
                    btn.classList.add('bg-gray-800', 'text-gray-300');
                }, 2000);
            }).catch(err => console.error('Fehler beim Kopieren:', err));
        }

        async function triggerNativeDownload() {
            const url = activeDownloadUrl;
            const title = document.getElementById('videoTitle').innerText;
            const cleanFilename = `${title.replace(/[^a-zA-Z0-9\s-_]/g, '')}.mp4`;
            const btn = document.getElementById('modalDownloadBtn');
            const originalText = btn.innerHTML;

            try {
                if ('showSaveFilePicker' in window) {
                    btn.innerHTML = '⏳ Ordner wählen...';
                    btn.disabled = true;

                    const handle = await window.showSaveFilePicker({
                        suggestedName: cleanFilename,
                        types: [{
                            description: 'Videodatei (MP4)',
                            accept: { 'video/mp4': ['.mp4'] }
                        }]
                    });

                    btn.innerHTML = '📥 Stream läuft...';
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Netzwerkfehler beim Abruf');

                    const writable = await handle.createWritable();
                    const reader = response.body.getReader();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        await writable.write(value);
                    }
                    await writable.close();

                    btn.innerHTML = '✅ Gespeichert!';
                    btn.disabled = false;
                    setTimeout(() => { btn.innerHTML = originalText; }, 3000);
                    return;
                }

                btn.innerHTML = '⏳ In Speicher laden...';
                btn.disabled = true;

                const response = await fetch(url);
                if (!response.ok) throw new Error('Netzwerkfehler');

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = cleanFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

                btn.innerHTML = '✅ Bereit!';
                btn.disabled = false;
                setTimeout(() => { btn.innerHTML = originalText; }, 3000);

            } catch (err) {
                console.warn('Download-Handling:', err);
                btn.disabled = false;

                if (err.name === 'AbortError') {
                    btn.innerHTML = originalText;
                    return;
                }

                btn.innerHTML = '❌ CORS-Schutz!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    window.open(url, '_blank');
                }, 2000);
            }
        }

        function openPlayer(url, title) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideoPlayer');
            const titleEl = document.getElementById('videoTitle');
            const downloadBtn = document.getElementById('modalDownloadBtn');
            const copyBtn = document.getElementById('modalCopyBtn');

            activeDownloadUrl = url; 
            titleEl.innerText = title;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 

            const isM3u8 = url.includes('.m3u8') || url.endsWith('.m3u8');
            if (currentView === 'mediathek' && !isM3u8) {
                downloadBtn.classList.remove('hidden');
                downloadBtn.classList.add('flex');
                copyBtn.classList.remove('hidden');
                copyBtn.classList.add('flex');
            } else {
                downloadBtn.classList.add('hidden');
                downloadBtn.classList.remove('flex');
                copyBtn.classList.add('hidden');
                copyBtn.classList.remove('flex');
            }

            if (activeVideoErrorHandler) {
                video.removeEventListener('error', activeVideoErrorHandler);
                activeVideoErrorHandler = null;
            }

            if (isM3u8) {
                if (Hls.isSupported()) {
                    if (hlsInstance) hlsInstance.destroy();
                    hlsInstance = new Hls({ manifestLoadingTimeOut: 1500, manifestLoadingMaxRetry: 0 });
                    hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                        if (!hlsInstance) return;
                        if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hlsInstance.off(Hls.Events.ERROR); 
                            window.open(url, '_blank');
                            closePlayer();
                        }
                    });
                    hlsInstance.loadSource(url);
                    hlsInstance.attachMedia(video);
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    activeVideoErrorHandler = function() {
                        video.removeEventListener('error', activeVideoErrorHandler);
                        activeVideoErrorHandler = null;
                        if (!video.src || video.src === "" || video.src === window.location.href) return;
                        window.open(url, '_blank');
                        closePlayer();
                    };
                    video.addEventListener('error', activeVideoErrorHandler);
                } else {
                    window.open(url, '_blank');
                    closePlayer();
                }
            } else {
                if (hlsInstance) {
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
                video.src = url;
                activeVideoErrorHandler = function() {
                    video.removeEventListener('error', activeVideoErrorHandler);
                    activeVideoErrorHandler = null;
                    if (!video.src || video.src === "" || video.src === window.location.href) return;
                    window.open(url, '_blank');
                    closePlayer();
                };
                video.addEventListener('error', activeVideoErrorHandler);
            }

            video.play().catch(err => console.log("Autoplay blockiert:", err));
        }

        function closePlayer() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('mainVideoPlayer');
            const downloadBtn = document.getElementById('modalDownloadBtn');
            const copyBtn = document.getElementById('modalCopyBtn');
            
            activeDownloadUrl = '';
            if (downloadBtn) downloadBtn.classList.add('hidden');
            if (copyBtn) copyBtn.classList.add('hidden');

            if (activeVideoErrorHandler) {
                video.removeEventListener('error', activeVideoErrorHandler);
                activeVideoErrorHandler = null;
            }
            video.onerror = null;
            video.pause();
            
            if (hlsInstance) {
                hlsInstance.off(Hls.Events.ERROR);
                hlsInstance.destroy();
                hlsInstance = null;
            }
            
            video.src = ""; 
            try { video.load(); } catch(e) {} 
            
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; 
        }

        document.getElementById('searchBar').addEventListener('input', filterResults);
        fetchAllData();
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registriert!', reg))
                    .catch(err => console.error('Service Worker Fehler:', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;            
            document.getElementById('btnInstallPWA').classList.remove('hidden');
        });
        document.getElementById('btnInstallPWA').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('btnInstallPWA').classList.add('hidden');
        });
        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            document.getElementById('btnInstallPWA').classList.add('hidden');
        });        
    </script>
